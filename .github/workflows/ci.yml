name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  # ── Python services (uv + pytest) ──────────────────────────────────────────
  test-python:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service: [mcp-server, agent-api]
    steps:
      - uses: actions/checkout@v6

      - uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: true
          cache-dependency-glob: services/${{ matrix.service }}/uv.lock

      - name: Run tests
        working-directory: services/${{ matrix.service }}
        run: uv run --all-extras pytest -x tests/
        env:
          AZURE_OPENAI_ENDPOINT: https://mock.openai.azure.com
          AZURE_SEARCH_ENDPOINT: https://mock.search.windows.net
          AZURE_SEARCH_API_KEY: mock-key
          AZURE_OPENAI_API_KEY: mock-key
          DD_AGENT_HOST: localhost
          EIA_API_KEY: mock-key
          KAFKA_BOOTSTRAP_SERVERS: localhost:9092

  # ── .NET services (dotnet build + test) ────────────────────────────────────
  test-dotnet:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service: [agent-api-dotnet, mcp-server-dotnet]
    defaults:
      run:
        working-directory: services/${{ matrix.service }}
    steps:
      - uses: actions/checkout@v6

      - name: Set up .NET 10
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Restore dependencies
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore -c Release

      - name: Test
        run: |
          if [ -d "tests" ]; then
            dotnet test --no-build -c Release --logger "trx;LogFileName=results.trx" --results-directory TestResults/
          else
            echo "No test project found — skipping (build verified above)"
          fi
        env:
          AZURE_OPENAI_ENDPOINT: https://mock.openai.azure.com
          AZURE_OPENAI_API_KEY: mock-key

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: dotnet-test-results-${{ matrix.service }}
          path: services/${{ matrix.service }}/TestResults/
          if-no-files-found: ignore
