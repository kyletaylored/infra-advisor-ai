name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service: [mcp-server, agent-api]
    steps:
      - uses: actions/checkout@v6

      - uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: true
          cache-dependency-glob: services/${{ matrix.service }}/uv.lock

      - name: Run tests
        working-directory: services/${{ matrix.service }}
        run: uv run --all-extras pytest -x tests/
        env:
          AZURE_OPENAI_ENDPOINT: https://mock.openai.azure.com
          AZURE_SEARCH_ENDPOINT: https://mock.search.windows.net
          AZURE_SEARCH_API_KEY: mock-key
          AZURE_OPENAI_API_KEY: mock-key
          DD_AGENT_HOST: localhost
          EIA_API_KEY: mock-key
          KAFKA_BOOTSTRAP_SERVERS: localhost:9092
