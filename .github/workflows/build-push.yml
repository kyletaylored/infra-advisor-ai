name: Build and push images

on:
  push:
    branches: [main]
  workflow_dispatch: # manual full rebuild without a commit

env:
  IMAGE_PREFIX: ghcr.io/kyletaylored/infra-advisor-ai
  REGISTRY: ghcr.io

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        service: [mcp-server, agent-api, load-generator, ui]
    steps:
      - uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.IMAGE_PREFIX }}/${{ matrix.service }}
          tags: |
            type=sha,prefix=
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v7
        env:
          # Disables all default buildx attestations — fixes GHCR 403 on HEAD
          # requests for new packages (GHCR returns 403 instead of 404 for
          # non-existent blobs when the package hasn't been pushed before)
          BUILDX_NO_DEFAULT_ATTESTATIONS: "1"
        with:
          context: services/${{ matrix.service }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          provenance: false
          sbom: false
          # cache-from intentionally omitted: GHA-cached (but never pushed) layers
          # trigger GHCR 403 on blob HEAD. Once packages are established in GHCR
          # cache-from can be re-enabled — the layers will already exist (200 not 403).
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}
