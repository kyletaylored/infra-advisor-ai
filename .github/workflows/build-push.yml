name: Build and push images

on:
  push:
    branches: [main]
    paths:
      # Only trigger when service code or this workflow changes.
      # README, docs/, infra/, .claude/ etc. never trigger a build.
      - 'services/**'
      - '.github/workflows/build-push.yml'
  workflow_dispatch: # manual full rebuild — always builds all services

env:
  IMAGE_PREFIX: ghcr.io/kyletaylored/infra-advisor-ai
  REGISTRY: ghcr.io

jobs:
  # ── Detect which services have changed ─────────────────────────────────────
  changes:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      mcp-server:         ${{ github.event_name == 'workflow_dispatch' || steps.filter.outputs.mcp-server == 'true' }}
      mcp-server-dotnet:  ${{ github.event_name == 'workflow_dispatch' || steps.filter.outputs.mcp-server-dotnet == 'true' }}
      agent-api:          ${{ github.event_name == 'workflow_dispatch' || steps.filter.outputs.agent-api == 'true' }}
      agent-api-dotnet:   ${{ github.event_name == 'workflow_dispatch' || steps.filter.outputs.agent-api-dotnet == 'true' }}
      auth-api:           ${{ github.event_name == 'workflow_dispatch' || steps.filter.outputs.auth-api == 'true' }}
      load-generator:     ${{ github.event_name == 'workflow_dispatch' || steps.filter.outputs.load-generator == 'true' }}
      ui:                 ${{ github.event_name == 'workflow_dispatch' || steps.filter.outputs.ui == 'true' }}
      airflow:            ${{ github.event_name == 'workflow_dispatch' || steps.filter.outputs.airflow == 'true' }}
      datadog:            ${{ github.event_name == 'workflow_dispatch' || steps.filter.outputs.datadog == 'true' }}
    steps:
      - uses: actions/checkout@v6

      - uses: dorny/paths-filter@v4
        id: filter
        if: github.event_name == 'push'
        with:
          filters: |
            mcp-server:
              - 'services/mcp-server/**'
            mcp-server-dotnet:
              - 'services/mcp-server-dotnet/**'
            agent-api:
              - 'services/agent-api/**'
            agent-api-dotnet:
              - 'services/agent-api-dotnet/**'
            auth-api:
              - 'services/auth-api/**'
            load-generator:
              - 'services/load-generator/**'
            ui:
              - 'services/ui/**'
            airflow:
              - 'k8s/airflow/**'
              - 'services/ingestion/**'
            datadog:
              - 'datadog/datadog-agent.yaml'

  # ── Build and push each changed service ────────────────────────────────────
  build:
    needs: changes
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: mcp-server
            changed: ${{ needs.changes.outputs.mcp-server }}
          - service: mcp-server-dotnet
            changed: ${{ needs.changes.outputs.mcp-server-dotnet }}
          - service: agent-api
            changed: ${{ needs.changes.outputs.agent-api }}
          - service: agent-api-dotnet
            changed: ${{ needs.changes.outputs.agent-api-dotnet }}
          - service: auth-api
            changed: ${{ needs.changes.outputs.auth-api }}
          - service: load-generator
            changed: ${{ needs.changes.outputs.load-generator }}
          - service: ui
            changed: ${{ needs.changes.outputs.ui }}
    steps:
      - uses: actions/checkout@v6

      - name: Set up Docker Buildx
        if: matrix.changed == 'true'
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        if: matrix.changed == 'true'
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        if: matrix.changed == 'true'
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.IMAGE_PREFIX }}/${{ matrix.service }}
          tags: |
            type=sha,prefix=
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Collect UI build args
        id: ui-args
        if: matrix.changed == 'true' && matrix.service == 'ui'
        run: |
          {
            echo "args<<EOF"
            echo "VITE_DD_RUM_APP_ID=${{ secrets.VITE_DD_RUM_APP_ID }}"
            echo "VITE_DD_RUM_CLIENT_TOKEN=${{ secrets.VITE_DD_RUM_CLIENT_TOKEN }}"
            echo "VITE_DD_RUM_SITE=${{ secrets.VITE_DD_RUM_SITE || 'us3.datadoghq.com' }}"
            echo "VITE_DD_ENV=${{ vars.DD_ENV || 'dev' }}"
            echo "VITE_APP_VERSION=${{ github.sha }}"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      # Build UI on runner so we can extract sourcemaps before the Docker image is sealed
      - name: Build UI (for sourcemap upload)
        id: ui-build
        if: matrix.changed == 'true' && matrix.service == 'ui'
        working-directory: services/ui
        env:
          VITE_DD_RUM_APP_ID: ${{ secrets.VITE_DD_RUM_APP_ID }}
          VITE_DD_RUM_CLIENT_TOKEN: ${{ secrets.VITE_DD_RUM_CLIENT_TOKEN }}
          VITE_DD_RUM_SITE: ${{ secrets.VITE_DD_RUM_SITE || 'us3.datadoghq.com' }}
          VITE_DD_ENV: ${{ vars.DD_ENV || 'dev' }}
          VITE_APP_VERSION: ${{ github.sha }}
        run: npm ci && npm run build

      - name: Upload sourcemaps to Datadog
        if: matrix.changed == 'true' && matrix.service == 'ui'
        working-directory: services/ui
        env:
          DATADOG_API_KEY: ${{ secrets.DD_API_KEY }}
          DATADOG_SITE: ${{ secrets.VITE_DD_RUM_SITE || 'us3.datadoghq.com' }}
        run: |
          npx @datadog/datadog-ci sourcemaps upload ./dist \
            --service infra-advisor-ui \
            --release-version "${{ github.sha }}" \
            --minified-path-prefix "https://infra-advisor-ai.kyletaylor.dev"

      - name: Build and push
        if: matrix.changed == 'true'
        uses: docker/build-push-action@v7
        with:
          context: services/${{ matrix.service }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          provenance: false
          sbom: false
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}
          build-args: |
            DD_GIT_REPOSITORY_URL=https://github.com/kyletaylored/infra-advisor-ai
            DD_GIT_COMMIT_SHA=${{ github.sha }}
            ${{ steps.ui-args.outputs.args }}

  # ── Rolling restart on AKS (only if a deployable service was rebuilt) ──────
  deploy:
    needs: [changes, build]
    runs-on: ubuntu-latest
    # Only deploy when at least one of the three long-running services changed.
    # load-generator is a CronJob — it picks up :latest on its next scheduled run.
    if: |
      github.ref == 'refs/heads/main' && (
        needs.changes.outputs.mcp-server        == 'true' ||
        needs.changes.outputs.mcp-server-dotnet == 'true' ||
        needs.changes.outputs.agent-api         == 'true' ||
        needs.changes.outputs.agent-api-dotnet  == 'true' ||
        needs.changes.outputs.auth-api          == 'true' ||
        needs.changes.outputs.ui                == 'true'
      )
    permissions:
      contents: read
    steps:
      - name: Azure login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Set up kubelogin
        uses: azure/use-kubelogin@v1.2
        with:
          kubelogin-version: 'v0.0.24'

      - name: Get AKS credentials
        uses: azure/aks-set-context@v5
        with:
          resource-group: rg-tola-infra-advisor-ai
          cluster-name: aks-infra-advisor-dev
          admin: 'false'
          use-kubelogin: 'true'

      - name: Rolling restart changed deployments
        run: |
          # Wrap each restart in an existence check so first-time deploys don't fail CI.
          # Initial apply is done via `make deploy-k8s`; CI only restarts existing deployments.
          restart() {
            local dep="$1"
            if kubectl get deployment/"$dep" -n infra-advisor &>/dev/null; then
              kubectl rollout restart deployment/"$dep" -n infra-advisor
            else
              echo "deployment/$dep not found in cluster — skipping (will be applied by make deploy-k8s)"
            fi
          }
          [ "${{ needs.changes.outputs.mcp-server }}" == "true" ]        && restart mcp-server
          [ "${{ needs.changes.outputs.mcp-server-dotnet }}" == "true" ] && restart mcp-server-dotnet
          [ "${{ needs.changes.outputs.agent-api }}" == "true" ]          && restart agent-api
          [ "${{ needs.changes.outputs.agent-api-dotnet }}" == "true" ]   && restart agent-api-dotnet
          [ "${{ needs.changes.outputs.auth-api }}" == "true" ]           && restart auth-api
          [ "${{ needs.changes.outputs.ui }}" == "true" ]                 && restart ui
          true  # ensure step always exits 0

      - name: Wait for rollouts
        run: |
          wait_rollout() {
            local dep="$1"
            if kubectl get deployment/"$dep" -n infra-advisor &>/dev/null; then
              kubectl rollout status deployment/"$dep" -n infra-advisor --timeout=5m
            fi
          }
          [ "${{ needs.changes.outputs.mcp-server }}" == "true" ]        && wait_rollout mcp-server
          [ "${{ needs.changes.outputs.mcp-server-dotnet }}" == "true" ] && wait_rollout mcp-server-dotnet
          [ "${{ needs.changes.outputs.agent-api }}" == "true" ]          && wait_rollout agent-api
          [ "${{ needs.changes.outputs.agent-api-dotnet }}" == "true" ]   && wait_rollout agent-api-dotnet
          [ "${{ needs.changes.outputs.auth-api }}" == "true" ]           && wait_rollout auth-api
          [ "${{ needs.changes.outputs.ui }}" == "true" ]                 && wait_rollout ui
          true  # ensure step always exits 0

  # ── Airflow Helm upgrade (values.yaml or ingestion DAG changes) ─────────────
  upgrade-airflow:
    needs: [changes]
    runs-on: ubuntu-latest
    if: |
      github.ref == 'refs/heads/main' &&
      needs.changes.outputs.airflow == 'true'
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - name: Azure login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Set up kubelogin
        uses: azure/use-kubelogin@v1.2
        with:
          kubelogin-version: 'v0.0.24'

      - name: Get AKS credentials
        uses: azure/aks-set-context@v5
        with:
          resource-group: rg-tola-infra-advisor-ai
          cluster-name: aks-infra-advisor-dev
          admin: 'false'
          use-kubelogin: 'true'

      - name: Add Airflow Helm repo
        run: |
          helm repo add apache-airflow https://airflow.apache.org
          helm repo update

      - name: Helm upgrade Airflow
        run: |
          # Roll back any stuck pending release before upgrading.
          STATUS=$(helm status airflow -n airflow -o json 2>/dev/null | jq -r '.info.status' || echo "not-found")
          if [[ "$STATUS" == "pending-install" || "$STATUS" == "pending-upgrade" || "$STATUS" == "pending-rollback" ]]; then
            echo "Release is stuck in $STATUS — rolling back to clear the lock"
            helm rollback airflow 0 --namespace airflow || true
          fi
          helm upgrade airflow apache-airflow/airflow \
            --namespace airflow \
            --values k8s/airflow/values.yaml \
            --timeout 10m \
            --wait \
            --cleanup-on-fail \
            --atomic

      - name: Sync DAGs to PVC
        run: |
          kubectl cp services/ingestion/dags/. \
            airflow/airflow-scheduler-0:/opt/airflow/dags/ \
            -c scheduler

  # ── Apply DatadogAgent CR (datadog/datadog-agent.yaml changes) ─────────────
  apply-datadog-agent:
    needs: [changes]
    runs-on: ubuntu-latest
    if: |
      github.ref == 'refs/heads/main' &&
      needs.changes.outputs.datadog == 'true'
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - name: Azure login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Set up kubelogin
        uses: azure/use-kubelogin@v1.2
        with:
          kubelogin-version: 'v0.0.24'

      - name: Get AKS credentials
        uses: azure/aks-set-context@v5
        with:
          resource-group: rg-tola-infra-advisor-ai
          cluster-name: aks-infra-advisor-dev
          admin: 'false'
          use-kubelogin: 'true'

      - name: Apply DatadogAgent CR
        run: kubectl apply -f datadog/datadog-agent.yaml
