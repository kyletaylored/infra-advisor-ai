name: Build and push images

on:
  push:
    branches: [main]
  workflow_dispatch: # manual full rebuild without a commit

env:
  IMAGE_PREFIX: ghcr.io/kyletaylored/infra-advisor-ai
  REGISTRY: ghcr.io

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        service: [mcp-server, agent-api, load-generator, ui]
    steps:
      - uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.IMAGE_PREFIX }}/${{ matrix.service }}
          tags: |
            type=sha,prefix=
            type=raw,value=latest,enable={{is_default_branch}}

      # Build to a local OCI tar — avoids buildx pushing directly to GHCR
      # which triggers 403 on blob HEAD for packages not yet in GHCR.
      - name: Build image to OCI tar
        uses: docker/build-push-action@v7
        with:
          context: services/${{ matrix.service }}
          outputs: type=docker,dest=/tmp/${{ matrix.service }}.tar
          labels: ${{ steps.meta.outputs.labels }}
          provenance: false
          sbom: false
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}

      # crane push handles GHCR correctly: treats 403 on blob HEAD as
      # "needs upload" rather than a fatal auth error (unlike buildx push).
      - name: Install crane
        uses: imjasonh/setup-crane@v0.4

      - name: Push with crane
        run: |
          while IFS= read -r tag; do
            [ -n "$tag" ] && crane push /tmp/${{ matrix.service }}.tar "$tag"
          done <<< "${{ steps.meta.outputs.tags }}"
