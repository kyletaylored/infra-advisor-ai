name: Build and push images

on:
  push:
    branches: [main]
  workflow_dispatch: # manual full rebuild without a commit

env:
  IMAGE_PREFIX: ghcr.io/kyletaylored/infra-advisor-ai
  REGISTRY: ghcr.io

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        service: [mcp-server, agent-api, load-generator, ui]
    steps:
      - uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.IMAGE_PREFIX }}/${{ matrix.service }}
          tags: |
            type=sha,prefix=
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Collect UI build args
        id: ui-args
        if: matrix.service == 'ui'
        run: |
          {
            echo "args<<EOF"
            echo "VITE_DD_RUM_APP_ID=${{ secrets.VITE_DD_RUM_APP_ID }}"
            echo "VITE_DD_RUM_CLIENT_TOKEN=${{ secrets.VITE_DD_RUM_CLIENT_TOKEN }}"
            echo "VITE_DD_RUM_SITE=${{ secrets.VITE_DD_RUM_SITE || 'us3.datadoghq.com' }}"
            echo "VITE_DD_ENV=${{ vars.DD_ENV || 'dev' }}"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: services/${{ matrix.service }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          provenance: false
          sbom: false
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}
          build-args: ${{ steps.ui-args.outputs.args }}

  deploy:
    needs: build
    runs-on: ubuntu-latest
    # Only deploy on pushes to main (not on workflow_dispatch triggered for a specific SHA)
    if: github.ref == 'refs/heads/main'
    permissions:
      id-token: write  # required for OIDC federation
      contents: read
    steps:
      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Get AKS credentials
        uses: azure/aks-set-context@v4
        with:
          resource-group: rg-tola-infra-advisor-ai
          cluster-name: aks-infra-advisor-dev
          admin: false
          use-kubelogin: true

      - name: Rolling restart deployments
        run: |
          kubectl rollout restart deployment/mcp-server -n infra-advisor
          kubectl rollout restart deployment/agent-api   -n infra-advisor
          kubectl rollout restart deployment/ui          -n infra-advisor

      - name: Wait for rollouts
        run: |
          kubectl rollout status deployment/mcp-server -n infra-advisor --timeout=5m
          kubectl rollout status deployment/agent-api  -n infra-advisor --timeout=5m
          kubectl rollout status deployment/ui         -n infra-advisor --timeout=5m
