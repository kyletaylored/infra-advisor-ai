name: Build and push images

on:
  push:
    branches: [main]
    paths:
      # Only trigger when service code or this workflow changes.
      # README, docs/, infra/, .claude/ etc. never trigger a build.
      - 'services/**'
      - '.github/workflows/build-push.yml'
  workflow_dispatch: # manual full rebuild — always builds all services

env:
  IMAGE_PREFIX: ghcr.io/kyletaylored/infra-advisor-ai
  REGISTRY: ghcr.io

jobs:
  # ── Detect which services have changed ─────────────────────────────────────
  changes:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      mcp-server:    ${{ github.event_name == 'workflow_dispatch' || steps.filter.outputs.mcp-server == 'true' }}
      agent-api:     ${{ github.event_name == 'workflow_dispatch' || steps.filter.outputs.agent-api == 'true' }}
      load-generator: ${{ github.event_name == 'workflow_dispatch' || steps.filter.outputs.load-generator == 'true' }}
      ui:            ${{ github.event_name == 'workflow_dispatch' || steps.filter.outputs.ui == 'true' }}
    steps:
      - uses: actions/checkout@v6

      - uses: dorny/paths-filter@v3
        id: filter
        if: github.event_name == 'push'
        with:
          filters: |
            mcp-server:
              - 'services/mcp-server/**'
            agent-api:
              - 'services/agent-api/**'
            load-generator:
              - 'services/load-generator/**'
            ui:
              - 'services/ui/**'

  # ── Build and push each changed service ────────────────────────────────────
  build:
    needs: changes
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: mcp-server
            changed: ${{ needs.changes.outputs.mcp-server }}
          - service: agent-api
            changed: ${{ needs.changes.outputs.agent-api }}
          - service: load-generator
            changed: ${{ needs.changes.outputs.load-generator }}
          - service: ui
            changed: ${{ needs.changes.outputs.ui }}
    steps:
      - uses: actions/checkout@v6

      - name: Set up Docker Buildx
        if: matrix.changed == 'true'
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        if: matrix.changed == 'true'
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        if: matrix.changed == 'true'
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.IMAGE_PREFIX }}/${{ matrix.service }}
          tags: |
            type=sha,prefix=
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Collect UI build args
        id: ui-args
        if: matrix.changed == 'true' && matrix.service == 'ui'
        run: |
          {
            echo "args<<EOF"
            echo "VITE_DD_RUM_APP_ID=${{ secrets.VITE_DD_RUM_APP_ID }}"
            echo "VITE_DD_RUM_CLIENT_TOKEN=${{ secrets.VITE_DD_RUM_CLIENT_TOKEN }}"
            echo "VITE_DD_RUM_SITE=${{ secrets.VITE_DD_RUM_SITE || 'us3.datadoghq.com' }}"
            echo "VITE_DD_ENV=${{ vars.DD_ENV || 'dev' }}"
            echo "VITE_APP_VERSION=${{ github.sha }}"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      # Build UI on runner so we can extract sourcemaps before the Docker image is sealed
      - name: Build UI (for sourcemap upload)
        id: ui-build
        if: matrix.changed == 'true' && matrix.service == 'ui'
        working-directory: services/ui
        env:
          VITE_DD_RUM_APP_ID: ${{ secrets.VITE_DD_RUM_APP_ID }}
          VITE_DD_RUM_CLIENT_TOKEN: ${{ secrets.VITE_DD_RUM_CLIENT_TOKEN }}
          VITE_DD_RUM_SITE: ${{ secrets.VITE_DD_RUM_SITE || 'us3.datadoghq.com' }}
          VITE_DD_ENV: ${{ vars.DD_ENV || 'dev' }}
          VITE_APP_VERSION: ${{ github.sha }}
        run: npm ci && npm run build

      - name: Upload sourcemaps to Datadog
        if: matrix.changed == 'true' && matrix.service == 'ui'
        working-directory: services/ui
        env:
          DATADOG_API_KEY: ${{ secrets.DD_API_KEY }}
        run: |
          npx @datadog/datadog-ci sourcemaps upload ./dist \
            --service infra-advisor-ui \
            --release-version "${{ github.sha }}" \
            --minified-path-prefix "https://infra-advisor-ai.kyletaylor.dev"

      - name: Build and push
        if: matrix.changed == 'true'
        uses: docker/build-push-action@v7
        with:
          context: services/${{ matrix.service }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          provenance: false
          sbom: false
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}
          build-args: |
            DD_GIT_REPOSITORY_URL=https://github.com/kyletaylored/infra-advisor-ai
            DD_GIT_COMMIT_SHA=${{ github.sha }}
            ${{ steps.ui-args.outputs.args }}

  # ── Rolling restart on AKS (only if a deployable service was rebuilt) ──────
  deploy:
    needs: [changes, build]
    runs-on: ubuntu-latest
    # Only deploy when at least one of the three long-running services changed.
    # load-generator is a CronJob — it picks up :latest on its next scheduled run.
    if: |
      github.ref == 'refs/heads/main' && (
        needs.changes.outputs.mcp-server    == 'true' ||
        needs.changes.outputs.agent-api     == 'true' ||
        needs.changes.outputs.ui            == 'true'
      )
    permissions:
      contents: read
    steps:
      - name: Azure login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Set up kubelogin
        uses: azure/use-kubelogin@v1.2
        with:
          kubelogin-version: 'v0.0.24'

      - name: Get AKS credentials
        uses: azure/aks-set-context@v5
        with:
          resource-group: rg-tola-infra-advisor-ai
          cluster-name: aks-infra-advisor-dev
          admin: 'false'
          use-kubelogin: 'true'

      - name: Rolling restart changed deployments
        run: |
          if [ "${{ needs.changes.outputs.mcp-server }}" == "true" ]; then
            kubectl rollout restart deployment/mcp-server -n infra-advisor
          fi
          if [ "${{ needs.changes.outputs.agent-api }}" == "true" ]; then
            kubectl rollout restart deployment/agent-api -n infra-advisor
          fi
          if [ "${{ needs.changes.outputs.ui }}" == "true" ]; then
            kubectl rollout restart deployment/ui -n infra-advisor
          fi

      - name: Wait for rollouts
        run: |
          if [ "${{ needs.changes.outputs.mcp-server }}" == "true" ]; then
            kubectl rollout status deployment/mcp-server -n infra-advisor --timeout=5m
          fi
          if [ "${{ needs.changes.outputs.agent-api }}" == "true" ]; then
            kubectl rollout status deployment/agent-api -n infra-advisor --timeout=5m
          fi
          if [ "${{ needs.changes.outputs.ui }}" == "true" ]; then
            kubectl rollout status deployment/ui -n infra-advisor --timeout=5m
          fi
