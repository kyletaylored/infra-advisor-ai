# Auto-instrumented POC stack.
#
# Two services:
#   otel-autoinstr-init  — one-shot. Pulls otel/autoinstrumentation-dotnet
#                          and copies /autoinstrumentation/. into a named
#                          volume. Exits with status 0 once done.
#   poc                  — builds the POC image, mounts the shared volume
#                          at /otel-auto/, sources instrument.sh at startup
#                          so the CLR profiler attaches before the app runs.
#
# The collector runs separately under experiments/otel-collector/. The POC
# reaches it via host.docker.internal:4318 (the host-published collector
# port), so the two compose stacks don't need to share a Docker network.

services:
  otel-autoinstr-init:
    image: otel/autoinstrumentation-dotnet:latest
    # Pin to linux/amd64 because the arm64-tagged image variant of
    # otel/autoinstrumentation-dotnet ships x64 native binaries only
    # (it has /autoinstrumentation/linux-x64/ and linux-musl-x64/ but
    # no linux-arm64/ — verified by digest inspection of the arm64
    # manifest sha256:b481acb...). Upstream issue tracking this:
    #   https://github.com/open-telemetry/opentelemetry-dotnet-instrumentation/issues/2314
    # Until that's fixed, we deliberately pull the amd64 image variant
    # so its /autoinstrumentation/linux-x64/ contents match the x64
    # .NET runtime that runs inside the amd64 container (under Rosetta
    # 2 emulation on Apple Silicon — slightly slower but correct).
    platform: linux/amd64
    command:
      - sh
      - -c
      - "cp -r /autoinstrumentation/. /shared/ && echo '✓ auto-instrumentation distro copied to shared volume'"
    volumes:
      - otel-auto:/shared
    restart: "no"

  poc:
    build:
      context: .
      dockerfile: Dockerfile
    # Match the init container's platform so the POC's .NET runtime
    # arch matches the native profiler binary it loads. entrypoint.sh
    # will detect x86_64 inside this amd64 container (Rosetta emulates
    # it as x86_64 on Apple Silicon) and pick /otel-auto/linux-x64/...
    platform: linux/amd64
    container_name: otel-poc-autoinstr
    depends_on:
      otel-autoinstr-init:
        condition: service_completed_successfully
    volumes:
      # Shared with init container. Mounted read-only — we only read profiler
      # binaries; nothing should be writing back to this volume at runtime.
      - otel-auto:/otel-auto:ro
    environment:
      # ── Profiler attach (canonical K8s-operator pattern) ────────────────
      # These six CORECLR_* / DOTNET_* / OTEL_DOTNET_AUTO_HOME vars are what
      # the .NET runtime reads at process startup to load the OpenTelemetry
      # auto-instrumentation native profiler. Without these set, dotnet
      # starts with no profiler attached and zero auto-spans are emitted.
      #
      # CORECLR_PROFILER_PATH is intentionally NOT set here — entrypoint.sh
      # computes it at runtime via `uname -m` so we don't have to predict
      # which image variant Docker will pull or what its internal layout is.
      CORECLR_ENABLE_PROFILING: "1"
      CORECLR_PROFILER: "{918728DD-259F-4A6A-AC2B-B85E1B658318}"
      DOTNET_ADDITIONAL_DEPS: /otel-auto/AdditionalDeps
      DOTNET_SHARED_STORE: /otel-auto/store
      DOTNET_STARTUP_HOOKS: /otel-auto/net/OpenTelemetry.AutoInstrumentation.StartupHook.dll
      OTEL_DOTNET_AUTO_HOME: /otel-auto

      # ── Verbose profiler diagnostics ────────────────────────────────────
      # OTEL_DOTNET_AUTO_LOGGER defaults to `file` — profiler logs go to
      # /var/log/opentelemetry/dotnet/*.log INSIDE the container, where
      # `docker compose up` doesn't see them. `console` redirects them to
      # stdout so the profiler's startup banner + instrumentation list
      # + exporter config show up in the regular container log stream.
      OTEL_DOTNET_AUTO_LOGGER: console
      OTEL_LOG_LEVEL: debug

      # ── Standard OTel knobs ─────────────────────────────────────────────
      OTEL_SERVICE_NAME: otel-genai-poc-autoinstr
      OTEL_EXPORTER_OTLP_ENDPOINT: http://host.docker.internal:4318
      OTEL_EXPORTER_OTLP_PROTOCOL: http/protobuf
      OTEL_RESOURCE_ATTRIBUTES: "deployment.environment=dev,service.version=1.0.0"

      # ── LLM provider ────────────────────────────────────────────────────
      AZURE_OPENAI_ENDPOINT: ${AZURE_OPENAI_ENDPOINT:?AZURE_OPENAI_ENDPOINT must be set}
      AZURE_OPENAI_API_KEY: ${AZURE_OPENAI_API_KEY:?AZURE_OPENAI_API_KEY must be set}
      AZURE_OPENAI_DEPLOYMENT: ${AZURE_OPENAI_DEPLOYMENT:-gpt-4.1-mini}

      # ── Browser RUM (optional; resolved from root .env by Makefile) ────
      DD_RUM_APPLICATION_ID: ${DD_RUM_APPLICATION_ID:-}
      DD_RUM_CLIENT_TOKEN: ${DD_RUM_CLIENT_TOKEN:-}
      DD_SITE: ${DD_SITE:-us3.datadoghq.com}
    ports:
      - "5006:8080"

volumes:
  otel-auto:
