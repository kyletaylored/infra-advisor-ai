server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Use Kubernetes CoreDNS for upstream resolution.
    # valid=10s means re-resolve every 10 seconds; ipv6=off avoids AAAA lookup failures.
    # Using a variable for proxy_pass makes resolution happen per-request rather than at
    # startup, so NGINX starts successfully even when a backend service isn't deployed yet.
    resolver 10.0.0.10 valid=10s ipv6=off;

    # SPA — serve index.html for all non-file routes
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy /airflow to Airflow API server (Airflow 3.x UI).
    # No path rewrite — full /airflow/... URI is passed to Airflow so it can
    # handle sub-path routing itself via AIRFLOW__API__BASE_URL.
    location ^~ /airflow/ {
        set $airflow_upstream http://airflow-api-server.airflow.svc.cluster.local:8080;
        proxy_pass $airflow_upstream;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect off;
        proxy_read_timeout 120s;
    }

    # Proxy /mailhog to MailHog web UI (WebSocket support for real-time email delivery)
    location ^~ /mailhog/ {
        set $mailhog_upstream http://mailhog.infra-advisor.svc.cluster.local:8025;
        rewrite ^/mailhog/(.*) /mailhog/$1 break;
        proxy_pass $mailhog_upstream;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 60s;
    }

    # Proxy /auth to auth-api service
    location /auth/ {
        set $auth_upstream http://auth-api.infra-advisor.svc.cluster.local:8002;
        rewrite ^/auth/(.*) /$1 break;
        proxy_pass $auth_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 120s;
    }

    # Proxy /api-dotnet to the .NET agent-api-dotnet service
    location /api-dotnet/ {
        set $dotnet_upstream http://agent-api-dotnet.infra-advisor.svc.cluster.local:8001;
        rewrite ^/api-dotnet/(.*) /$1 break;
        proxy_pass $dotnet_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 120s;
    }

    # Proxy /api to agent-api service
    location /api/ {
        set $api_upstream http://agent-api.infra-advisor.svc.cluster.local:8001;
        rewrite ^/api/(.*) /$1 break;
        proxy_pass $api_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 120s;
    }

    # Cache static assets served by this nginx (UI app only — /assets/ path)
    location ~* ^/assets/.*\.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    gzip on;
    gzip_types text/plain text/css application/json application/javascript;
}
