server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Use Kubernetes CoreDNS for upstream resolution.
    # valid=10s means re-resolve every 10 seconds; ipv6=off avoids AAAA lookup failures.
    # Using a variable for proxy_pass makes resolution happen per-request rather than at
    # startup, so NGINX starts successfully even when a backend service isn't deployed yet.
    resolver 10.0.0.10 valid=10s ipv6=off;

    # SPA — serve index.html for all non-file routes
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy /airflow to Airflow API server (Airflow 3.x UI).
    # No path rewrite — full /airflow/... URI is passed to Airflow so it can
    # handle sub-path routing itself via AIRFLOW__API__BASE_URL.
    location ^~ /airflow/ {
        set $airflow_upstream http://airflow-api-server.airflow.svc.cluster.local:8080;
        proxy_pass $airflow_upstream;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect off;
        proxy_read_timeout 120s;
    }

    # Proxy /mailpit/ to the Mailpit inbox web UI. Mailpit's own MP_UI_AUTH
    # bcrypt-credential basic-auth gates this — credentials live in the
    # mailpit-secret K8s Secret created via `make create-mailpit-secret`.
    # For defense-in-depth, also add a Cloudflare Access policy in front of
    # /mailpit/* — the inbox holds password-reset tokens, so a single layer
    # of basic auth isn't sufficient if the credential leaks.
    #
    # MP_WEBROOT=/mailpit on the Mailpit pod makes all UI links/assets root
    # under /mailpit/, so no path rewriting is needed.
    location ^~ /mailpit/ {
        set $mailpit_upstream http://mailpit.infra-advisor.svc.cluster.local:8025;
        proxy_pass $mailpit_upstream;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # Pass the Authorization header through — Mailpit's MP_UI_AUTH expects it.
        proxy_pass_request_headers on;
        proxy_read_timeout 60s;
    }

    # Proxy /auth to auth-api service
    location /auth/ {
        set $auth_upstream http://auth-api.infra-advisor.svc.cluster.local:8002;
        rewrite ^/auth/(.*) /$1 break;
        proxy_pass $auth_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 120s;
    }

    # Proxy /api-dotnet/query/stream — Server-Sent Events. NGINX defaults
    # buffer the response body, which would batch SSE chunks into a single
    # delivery at the end of the stream (defeating the point). Must come
    # BEFORE the generic /api-dotnet/ block so the longer prefix wins.
    location /api-dotnet/query/stream {
        set $dotnet_upstream http://agent-api-dotnet.infra-advisor.svc.cluster.local:8001;
        rewrite ^/api-dotnet/(.*) /$1 break;
        proxy_pass $dotnet_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Session-ID $http_x_session_id;
        proxy_set_header X-DD-RUM-Session-ID $http_x_dd_rum_session_id;
        proxy_set_header X-Conversation-ID $http_x_conversation_id;
        proxy_set_header X-User-ID $http_x_user_id;
        proxy_http_version 1.1;
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
        chunked_transfer_encoding on;
    }

    # Proxy /api-dotnet to the .NET agent-api-dotnet service
    location /api-dotnet/ {
        set $dotnet_upstream http://agent-api-dotnet.infra-advisor.svc.cluster.local:8001;
        rewrite ^/api-dotnet/(.*) /$1 break;
        proxy_pass $dotnet_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        # Session and Datadog headers — explicitly forwarded so they survive rewrite.
        proxy_set_header X-Session-ID $http_x_session_id;
        proxy_set_header X-DD-RUM-Session-ID $http_x_dd_rum_session_id;
        proxy_set_header X-Conversation-ID $http_x_conversation_id;
        proxy_set_header X-User-ID $http_x_user_id;
        proxy_read_timeout 120s;
    }

    # Proxy /api to agent-api service
    location /api/ {
        set $api_upstream http://agent-api.infra-advisor.svc.cluster.local:8001;
        rewrite ^/api/(.*) /$1 break;
        proxy_pass $api_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 120s;
    }

    # Cache static assets served by this nginx (UI app only — /assets/ path)
    location ~* ^/assets/.*\.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    gzip on;
    gzip_types text/plain text/css application/json application/javascript;
}
