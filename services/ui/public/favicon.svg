<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <rect width="32" height="32" rx="7" fill="#1D4ED8"/>
  <!-- Bridge deck -->
  <rect x="2" y="18" width="28" height="2.5" rx="1" fill="white"/>
  <!-- Left tower -->
  <rect x="7" y="9" width="2.5" height="9" rx="1" fill="white"/>
  <!-- Right tower -->
  <rect x="22.5" y="9" width="2.5" height="9" rx="1" fill="white"/>
  <!-- Cables left tower -->
  <line x1="8.25" y1="9.5" x2="2" y2="18" stroke="white" stroke-width="1" stroke-linecap="round"/>
  <line x1="8.25" y1="9.5" x2="16" y2="18" stroke="white" stroke-width="1" stroke-linecap="round"/>
  <!-- Cables right tower -->
  <line x1="23.75" y1="9.5" x2="16" y2="18" stroke="white" stroke-width="1" stroke-linecap="round"/>
  <line x1="23.75" y1="9.5" x2="30" y2="18" stroke="white" stroke-width="1" stroke-linecap="round"/>
  <!-- Piers -->
  <rect x="7" y="20.5" width="2.5" height="4" rx="1" fill="white"/>
  <rect x="22.5" y="20.5" width="2.5" height="4" rx="1" fill="white"/>
</svg>
