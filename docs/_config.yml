# =============================================================================
# Theme — Chirpy
# https://chirpy.cotes.page
# =============================================================================
theme: jekyll-theme-chirpy

# =============================================================================
# Site metadata
# =============================================================================
lang: en
timezone: America/Chicago

title: InfraAdvisor AI
tagline: AI-powered infrastructure advisory platform
description: >-
  Multi-agent AI platform for infrastructure consulting firms.
  Combines government data pipelines, LangChain ReAct reasoning,
  and full-stack Datadog observability on Azure Kubernetes Service.

url: "https://kyletaylored.github.io"
baseurl: "/infra-advisor-ai"

# =============================================================================
# Author / social
# =============================================================================
github:
  username: kyletaylored

social:
  name: Kyle Taylor
  email: kyle.taylor@datadoghq.com
  links:
    - https://github.com/kyletaylored

# =============================================================================
# Appearance
# =============================================================================
# Path to a square avatar image (512×512 px recommended).
# Place the file at docs/assets/img/avatar.png and uncomment the line below.
# avatar: /assets/img/avatar.png

# Auto dark/light mode based on system preference (leave blank for auto).
# theme_mode: # [light | dark]

toc: true

# =============================================================================
# Features
# =============================================================================
mermaid:
  enabled: true

pwa:
  enabled: true
  cache:
    enabled: true
    deny_paths: []

# =============================================================================
# Analytics (fill in when ready)
# =============================================================================
analytics:
  google:
    id: ""

# =============================================================================
# Comments — disabled for docs site
# =============================================================================
comments:
  provider: ""

# =============================================================================
# Pagination
# =============================================================================
paginate: 10

# =============================================================================
# Tab collection — REQUIRED for Chirpy sidebar navigation
# =============================================================================
collections:
  tabs:
    output: true
    sort_by: order

# =============================================================================
# Page defaults
# =============================================================================
defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: post
      comments: false
      toc: true
      permalink: /posts/:title/
  - scope:
      path: _drafts
    values:
      comments: false
  - scope:
      path: ""
      type: tabs
    values:
      layout: page
      permalink: /:title/
  # Apply page layout + ToC to all doc pages automatically
  - scope:
      path: ""
    values:
      layout: page
      toc: true

# =============================================================================
# Markdown / syntax highlighting
# =============================================================================
kramdown:
  footnote_backlink: "&#8617;&#xfe0e;"
  syntax_highlighter: rouge
  syntax_highlighter_opts:
    css_class: highlight
    block:
      line_numbers: true
      start_line: 1

# =============================================================================
# Build optimisation
# =============================================================================
sass:
  style: compressed

compress_html:
  clippings: all
  comments: all
  endings: all
  profile: false
  blanklines: false
  ignore:
    envs: [development]

exclude:
  - "*.gem"
  - "*.gemspec"
  - Gemfile
  - Gemfile.lock
  - README.md
  - node_modules
  - "vendor/"

# =============================================================================
# Category / tag archives
# =============================================================================
jekyll-archives:
  enabled: [categories, tags]
  layouts:
    category: category
    tag: tag
  permalinks:
    tag: /tags/:name/
    category: /categories/:name/
