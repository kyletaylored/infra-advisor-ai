title: InfraAdvisor AI
description: >-
  AI-powered infrastructure advisory platform for AECOM-scale consulting firms.
  Combines government data pipelines, multi-agent reasoning, and full-stack
  Datadog observability on Azure Kubernetes Service.

remote_theme: just-the-docs/just-the-docs@v0.10.1

url: https://kyletaylored.github.io
baseurl: /infra-advisor-ai

# GitHub repo link in header
aux_links:
  "GitHub":
    - "https://github.com/kyletaylored/infra-advisor-ai"
aux_links_new_tab: true

# Search
search_enabled: true
search:
  heading_level: 2
  previews: 2
  preview_words_before: 3
  preview_words_after: 3
  tokenizer_separator: /[\s/]+/
  rel_url: true
  button: false

# Footer
footer_content: >-
  InfraAdvisor AI &mdash; Built with Azure, LangChain, and Datadog.

# Collections (needed for just-the-docs nav)
collections:
  docs:
    permalink: "/:collection/:path/"
    output: true

# Callout support
callouts_level: quiet
callouts:
  highlight:
    color: yellow
  important:
    title: Important
    color: blue
  new:
    title: New
    color: green
  note:
    title: Note
    color: purple
  warning:
    title: Warning
    color: red

# Color scheme
color_scheme: light

plugins:
  - jekyll-seo-tag
