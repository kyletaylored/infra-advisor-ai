apiVersion: apps/v1
kind: Deployment
metadata:
  name: mcp-server-dotnet
  namespace: infra-advisor
  labels:
    app: mcp-server-dotnet
    tags.datadoghq.com/env: dev
    tags.datadoghq.com/service: infra-advisor-mcp-server-dotnet
    tags.datadoghq.com/version: latest
spec:
  replicas: 2
  selector:
    matchLabels:
      app: mcp-server-dotnet
  template:
    metadata:
      labels:
        app: mcp-server-dotnet
        tags.datadoghq.com/env: dev
        tags.datadoghq.com/service: infra-advisor-mcp-server-dotnet
        tags.datadoghq.com/version: latest
      annotations:
        ad.datadoghq.com/mcp-server-dotnet.logs: '[{"source":"csharp","service":"infra-advisor-mcp-server-dotnet"}]'
        # Opt out of namespace-wide DD .NET tracer auto-injection (same reason
        # as agent-api-dotnet — parallel tracer creates non-OTLP spans that
        # break span links from the MCP client).
        admission.datadoghq.com/enabled: "false"
    spec:
      imagePullSecrets:
        - name: ghcr-pull-secret
      containers:
        - name: mcp-server-dotnet
          image: ghcr.io/kyletaylored/infra-advisor-ai/mcp-server-dotnet:latest
          ports:
            - containerPort: 8000
              name: http
          envFrom:
            - configMapRef:
                name: mcp-server-dotnet-config
            - secretRef:
                name: mcp-server-dotnet-secret
          securityContext:
            runAsNonRoot: true
            # Pinned explicitly (aspnet base image's built-in 'app' user, UID
            # 1654) so the kubelet never has to resolve a non-numeric USER
            # from the image's /etc/passwd to verify runAsNonRoot — that
            # resolution silently started failing with CreateContainerConfigError
            # ("cannot verify user is non-root") on a base-image/containerd
            # change, even though the Dockerfile's USER app was unchanged.
            runAsUser: 1654
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 15
            timeoutSeconds: 5
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"
