apiVersion: v1
kind: ConfigMap
metadata:
  name: mcp-server-dotnet-config
  namespace: infra-advisor
  labels:
    app: mcp-server-dotnet
data:
  # Unified service tagging for DD agent container metadata (no DD .NET tracer
  # in this pod — see deployment.yaml).
  DD_ENV: "dev"
  DD_SERVICE: "infra-advisor-mcp-server-dotnet"
  DD_VERSION: "latest"
  DD_SITE: "us3.datadoghq.com"

  # OpenTelemetry SDK is the sole telemetry source — all DD_TRACE_* env vars
  # are removed; no consumer in this pod.
  OTEL_EXPORTER_OTLP_ENDPOINT: "http://datadog-agent.datadog.svc.cluster.local:4318"
  OTEL_SERVICE_NAME: "infra-advisor-mcp-server-dotnet"
  OTEL_RESOURCE_ATTRIBUTES: "deployment.environment=dev,service.version=latest,service.name=infra-advisor-mcp-server-dotnet"
  ASPNETCORE_ENVIRONMENT: "Production"
  AZURE_SEARCH_INDEX_NAME: "infra-advisor-knowledge"
  AZURE_OPENAI_DEPLOYMENT_NAME: "gpt-4.1-mini"
  AZURE_OPENAI_EMBEDDING_DEPLOYMENT: "text-embedding-3-small"
  EPA_SDWIS_BASE_URL: "https://enviro.epa.gov/enviro/efservice"
  ERCOT_API_BASE_URL: "https://api.ercot.com/api/public-data"
  TXDOT_HUB_URL: "https://gis-txdot.opendata.arcgis.com/api/search"
  LOG_LEVEL: "INFO"
