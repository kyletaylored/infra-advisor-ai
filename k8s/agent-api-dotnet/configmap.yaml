apiVersion: v1
kind: ConfigMap
metadata:
  name: agent-api-dotnet-config
  namespace: infra-advisor
  labels:
    app: agent-api-dotnet
data:
  DD_ENV: "dev"
  DD_VERSION: "latest"
  DD_AGENT_HOST: "datadog-agent.datadog.svc.cluster.local"
  OTEL_EXPORTER_OTLP_ENDPOINT: "http://datadog-agent.datadog.svc.cluster.local:4318"
  OTEL_SERVICE_NAME: "infraadvisor-agent-api-dotnet"
  OTEL_RESOURCE_ATTRIBUTES: "deployment.environment=dev,service.version=latest"
  KAFKA_BOOTSTRAP_SERVERS: "kafka-cluster-kafka-bootstrap.kafka.svc.cluster.local:9092"
  AZURE_OPENAI_DEPLOYMENT: "gpt-4.1-mini"
  AZURE_OPENAI_EVAL_DEPLOYMENT: "gpt-4.1-mini"
  AVAILABLE_MODELS: "gpt-4.1-mini,gpt-4.1,gpt-5.4-mini"
  MCP_SERVER_URL: "http://mcp-server-dotnet.infra-advisor.svc.cluster.local:8000/mcp"
  REDIS_HOST: "redis.infra-advisor.svc.cluster.local"
  REDIS_PORT: "6379"
  LOG_LEVEL: "Information"
  ASPNETCORE_ENVIRONMENT: "Production"
  DD_DBM_PROPAGATION_MODE: "full"
