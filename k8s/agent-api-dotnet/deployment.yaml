apiVersion: apps/v1
kind: Deployment
metadata:
  name: agent-api-dotnet
  namespace: infra-advisor
  labels:
    app: agent-api-dotnet
    tags.datadoghq.com/env: dev
    tags.datadoghq.com/service: infra-advisor-agent-api-dotnet
    tags.datadoghq.com/version: latest
spec:
  replicas: 1
  selector:
    matchLabels:
      app: agent-api-dotnet
  template:
    metadata:
      labels:
        app: agent-api-dotnet
        tags.datadoghq.com/env: dev
        tags.datadoghq.com/service: infra-advisor-agent-api-dotnet
        tags.datadoghq.com/version: latest
      annotations:
        # DD agent's log collector parses csharp source — picks up our Serilog
        # RenderedCompactJsonFormatter output and correlates with traces via the
        # OTel @tr/@sp fields.
        ad.datadoghq.com/agent-api-dotnet.logs: "[{\"source\":\"csharp\",\"service\":\"infra-advisor-agent-api-dotnet\"}]"
        # Opt out of the namespace-wide DD .NET tracer auto-injection
        # (datadog-agent.yaml apm.instrumentation targets infra-advisor namespace).
        # Without this, the admission webhook injects DD tracer v3 alongside our
        # OTel SDK. The two tracers create parallel root spans — DD tracer sends
        # via its own agent protocol, OTel sends via OTLP — so LLM spans (OTel)
        # are orphaned from the DD-tracer root and span links point to non-OTLP
        # spans that Datadog reports as "not ingested or retained".
        admission.datadoghq.com/enabled: "false"
    spec:
      imagePullSecrets:
        - name: ghcr-pull-secret
      containers:
        - name: agent-api-dotnet
          image: ghcr.io/kyletaylored/infra-advisor-ai/agent-api-dotnet:latest
          ports:
            - containerPort: 8001
              name: http
          env:
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: redis-secret
                  key: REDIS_PASSWORD
          envFrom:
            - configMapRef:
                name: agent-api-dotnet-config
            - secretRef:
                name: agent-api-dotnet-secret
          securityContext:
            runAsNonRoot: true
            # Pinned explicitly (aspnet base image's built-in 'app' user, UID
            # 1654) so the kubelet never has to resolve a non-numeric USER
            # from the image's /etc/passwd to verify runAsNonRoot — that
            # resolution silently started failing with CreateContainerConfigError
            # ("cannot verify user is non-root") on a base-image/containerd
            # change, even though the Dockerfile's USER app was unchanged.
            runAsUser: 1654
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          livenessProbe:
            httpGet:
              path: /health
              port: 8001
            initialDelaySeconds: 20
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 8001
            initialDelaySeconds: 15
            periodSeconds: 15
            timeoutSeconds: 5
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"
