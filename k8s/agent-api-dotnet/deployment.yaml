apiVersion: apps/v1
kind: Deployment
metadata:
  name: agent-api-dotnet
  namespace: infra-advisor
  labels:
    app: agent-api-dotnet
    tags.datadoghq.com/env: dev
    tags.datadoghq.com/service: infra-advisor-agent-api-dotnet
    tags.datadoghq.com/version: latest
spec:
  replicas: 1
  selector:
    matchLabels:
      app: agent-api-dotnet
  template:
    metadata:
      labels:
        app: agent-api-dotnet
        tags.datadoghq.com/env: dev
        tags.datadoghq.com/service: infra-advisor-agent-api-dotnet
        tags.datadoghq.com/version: latest
      annotations:
        # DD agent's log collector parses csharp source — picks up our Serilog
        # RenderedCompactJsonFormatter output and correlates with traces via the
        # OTel @tr/@sp fields.
        ad.datadoghq.com/agent-api-dotnet.logs: "[{\"source\":\"csharp\",\"service\":\"infra-advisor-agent-api-dotnet\"}]"
        # DD .NET tracer admission injection (admission.datadoghq.com/dotnet-lib.version)
        # is deliberately omitted. This service is 100% OpenTelemetry-instrumented;
        # the DD tracer ran in parallel and split trace_ids (it reads RUM's legacy
        # x-datadog-trace-id header while OTel SDK uses W3C traceparent — they
        # diverged on every request). Removing it unifies the trace tree and
        # matches the project's stated goal: demonstrate OTel-only LLMObs on .NET.
    spec:
      imagePullSecrets:
        - name: ghcr-pull-secret
      containers:
        - name: agent-api-dotnet
          image: ghcr.io/kyletaylored/infra-advisor-ai/agent-api-dotnet:latest
          ports:
            - containerPort: 8001
              name: http
          envFrom:
            - configMapRef:
                name: agent-api-dotnet-config
            - secretRef:
                name: agent-api-dotnet-secret
          livenessProbe:
            httpGet:
              path: /health
              port: 8001
            initialDelaySeconds: 20
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 8001
            initialDelaySeconds: 15
            periodSeconds: 15
            timeoutSeconds: 5
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"
