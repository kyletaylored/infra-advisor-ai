# Helm values for apache-airflow/airflow chart
# Deploy to namespace: airflow
# helm upgrade --install airflow apache-airflow/airflow \
#   --namespace airflow --values k8s/airflow/values.yaml --timeout 10m --wait

# Static API secret key — prevents unnecessary pod restarts on helm upgrade.
# Key stored in airflow-azure-secret under key webserver-secret-key.
# Generate with: python -c "import secrets; print(secrets.token_hex(32))"
webserverSecretKeySecretName: airflow-azure-secret

# Executor: LocalExecutor — runs tasks inside scheduler process.
# Eliminates separate worker pods; appropriate for lab scale with 5 DAGs.
# At 3× Standard_D2s_v3 (24 GB total cluster RAM), this avoids OOM pressure.
executor: LocalExecutor

# Explicitly enable DB migration Job (correct key for airflow-1.x chart)
migrateDatabaseJob:
  enabled: true

# Increase wait timeout — default 60s too short when PostgreSQL cold-starts
images:
  migrationsWaitTimeout: 300

# Metadata DB — built-in Postgres sidecar via Helm
postgresql:
  enabled: true

# DAG persistence via PVC (git-sync or PVC; using PVC for simplicity)
dags:
  persistence:
    enabled: true
    storageClassName: azurefile-csi
    accessMode: ReadWriteMany
    size: 1Gi
  gitSync:
    enabled: false
    recommendedProbeSetting: true

# Extra pip packages for all Airflow pods (scheduler + webserver).
# With LocalExecutor, tasks run in the scheduler — packages are needed there.
#
# DJM requirements (Kubernetes / Datadog Transport):
#   apache-airflow-providers-openlineage >= 2.7.3  (Datadog transport support)
#   openlineage-python >= 1.37.0                   (Datadog transport support)
_pip_additional_requirements: >-
  apache-airflow-providers-openlineage>=2.7.3 openlineage-python>=1.37.0
  apache-airflow-providers-http>=6.0.0 azure-storage-blob>=12.28.0
  azure-search-documents>=11.6.0 azure-identity>=1.25.3 tiktoken>=0.12.0
  openpyxl>=3.1.5 pandas>=3.0.0 openai>=2.32.0 pyspark==4.1.1 ddtrace>=4.7.1
  httpx>=0.28.1 pypdf>=5.0.0 beautifulsoup4>=4.12.3 lxml>=5.3.0

# ── Scheduler ──────────────────────────────────────────────────────────────────

scheduler:
  # Log collection annotation — lets the Datadog Agent correlate task logs with
  # DJM run executions.  The Agent DaemonSet must also mount the logs PVC.
  # See: https://docs.datadoghq.com/containers/kubernetes/log/
  podAnnotations:
    ad.datadoghq.com/scheduler.logs: >-
      [{"type": "file", "path": "/opt/airflow/logs/*/*/*/*.log", "source":
      "airflow"}]

  env:
    # ── Datadog Data Jobs Monitoring — OpenLineage Datadog Transport (Option 1) ──
    # Recommended for Kubernetes. Requires:
    #   apache-airflow-providers-openlineage >= 2.7.3
    #   openlineage-python >= 1.37.0
    # Docs: https://docs.datadoghq.com/data_observability/jobs_monitoring/airflow/
    - name: DD_DATA_JOBS_ENABLED
      value: "true"
    - name: OPENLINEAGE__TRANSPORT__TYPE
      value: "datadog"
    # OPENLINEAGE_NAMESPACE sets the 'env' tag on all DJM runs in Datadog.
    # Keep in sync with DD_ENV so runs are grouped with other dev telemetry.
    - name: OPENLINEAGE_NAMESPACE
      value: "dev"
    - name: DD_SITE
      value: "us3.datadoghq.com"
    - name: DD_API_KEY
      valueFrom:
        secretKeyRef:
          name: airflow-azure-secret
          key: DD_API_KEY

    # ── Airflow + Spark parent job linking ──────────────────────────────────────
    # Injects Airflow task context into PySpark applications so DJM shows the
    # parent Airflow task alongside each Spark job.
    # Requires: apache-airflow-providers-openlineage >= 2.1.0, Airflow >= 2.9
    - name: AIRFLOW__OPENLINEAGE__SPARK_INJECT_PARENT_JOB_INFO
      value: "true"
    - name: AIRFLOW__LINEAGE__BACKEND
      value: "openlineage.lineage_backend.OpenLineageBackend"

    # ── Datadog APM ─────────────────────────────────────────────────────────────
    - name: DD_ENV
      value: "dev"
    - name: DD_SERVICE
      value: "airflow-scheduler"
    - name: DD_VERSION
      value: "latest"
    - name: DD_AGENT_HOST
      value: "datadog-agent.datadog.svc.cluster.local"
    - name: DD_TRACE_AGENT_PORT
      value: "8126"
    - name: DD_LOGS_INJECTION
      value: "true"
    - name: DD_TRACE_SAMPLE_RATE
      value: "1.0"

    # ── Azure credentials ───────────────────────────────────────────────────────
    - name: AZURE_OPENAI_ENDPOINT
      valueFrom:
        secretKeyRef:
          name: airflow-azure-secret
          key: AZURE_OPENAI_ENDPOINT
    - name: AZURE_OPENAI_API_KEY
      valueFrom:
        secretKeyRef:
          name: airflow-azure-secret
          key: AZURE_OPENAI_API_KEY
    - name: AZURE_OPENAI_DEPLOYMENT
      value: "gpt-4.1-mini"
    - name: AZURE_OPENAI_EMBEDDING_DEPLOYMENT
      value: "text-embedding-3-small"
    - name: AZURE_SEARCH_ENDPOINT
      valueFrom:
        secretKeyRef:
          name: airflow-azure-secret
          key: AZURE_SEARCH_ENDPOINT
    - name: AZURE_SEARCH_API_KEY
      valueFrom:
        secretKeyRef:
          name: airflow-azure-secret
          key: AZURE_SEARCH_API_KEY
    - name: AZURE_SEARCH_INDEX_NAME
      value: "infra-advisor-knowledge"
    - name: AZURE_STORAGE_CONNECTION_STRING
      valueFrom:
        secretKeyRef:
          name: airflow-azure-secret
          key: AZURE_STORAGE_CONNECTION_STRING
    - name: EIA_API_KEY
      valueFrom:
        secretKeyRef:
          name: airflow-azure-secret
          key: EIA_API_KEY
    - name: TWDB_WATER_PLAN_WORKBOOK_URL
      value: "https://www.twdb.texas.gov/waterplanning/data/rwp-database/index.asp"
    - name: EPA_SDWIS_BASE_URL
      value: "https://enviro.epa.gov/enviro/efservice"

# ── Triggerer ──────────────────────────────────────────────────────────────────

triggerer:
  env:
    # OpenLineage must also be configured on the triggerer (deferred tasks)
    - name: DD_DATA_JOBS_ENABLED
      value: "true"
    - name: OPENLINEAGE__TRANSPORT__TYPE
      value: "datadog"
    - name: OPENLINEAGE_NAMESPACE
      value: "dev"
    - name: DD_SITE
      value: "us3.datadoghq.com"
    - name: DD_API_KEY
      valueFrom:
        secretKeyRef:
          name: airflow-azure-secret
          key: DD_API_KEY
    - name: DD_ENV
      value: "dev"
    - name: DD_SERVICE
      value: "airflow-triggerer"
    - name: DD_AGENT_HOST
      value: "datadog-agent.datadog.svc.cluster.local"
    - name: AIRFLOW__LINEAGE__BACKEND
      value: "openlineage.lineage_backend.OpenLineageBackend"

# ── dagProcessor ──────────────────────────────────────────────────────────────────
dagProcessor:
  env:
    - name: DD_DATA_JOBS_ENABLED
      value: "true"
    - name: OPENLINEAGE__TRANSPORT__TYPE
      value: "datadog"
    - name: OPENLINEAGE_NAMESPACE
      value: "dev"
    - name: AIRFLOW__LINEAGE__BACKEND
      value: "openlineage.lineage_backend.OpenLineageBackend"
    - name: DD_SITE
      value: "us3.datadoghq.com"
    - name: DD_API_KEY
      valueFrom:
        secretKeyRef:
          name: airflow-azure-secret
          key: DD_API_KEY
    - name: DD_ENV
      value: "dev"
    - name: DD_SERVICE
      value: "airflow-dag-processor"
    - name: DD_AGENT_HOST
      value: "datadog-agent.datadog.svc.cluster.local"

# ── User creation ──────────────────────────────────────────────────────────────

# User creation job (AF3: moved from webserver.defaultUser)
createUserJob:
  defaultUser:
    role: Admin
    username: admin
    email: admin@infra-advisor.local
    firstName: Admin
    lastName: User
    password: admin # Change in production

# ── Resources ─────────────────────────────────────────────────────────────────

# Resource limits — conservative for Standard_D2s_v3 lab cluster
resources:
  requests:
    memory: "512Mi"
    cpu: "250m"
  limits:
    memory: "1Gi"
    cpu: "500m"

# ── Logs ──────────────────────────────────────────────────────────────────────

# Logs — use PVC for local log storage
logs:
  persistence:
    enabled: true
    storageClassName: azurefile-csi
    size: 2Gi

# ── Labels ────────────────────────────────────────────────────────────────────

# Labels for Datadog log collection autodiscovery
labels:
  app: airflow
  tags.datadoghq.com/env: dev
  tags.datadoghq.com/service: airflow
  tags.datadoghq.com/version: "3.1"
