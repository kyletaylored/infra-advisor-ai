# Helm values for apache-airflow/airflow chart
# Deploy to namespace: airflow
# Fresh install: make install-airflow
# Upgrade only:  make upgrade-airflow

# ── API server (Airflow 3.x) ──────────────────────────────────────────────────
# Serve the UI at /airflow so it's accessible via the existing nginx reverse proxy.
apiServer:
  # --proxy-headers: trust X-Forwarded-Proto/For/Port headers from nginx
  args: ["bash", "-c", "exec airflow api-server --proxy-headers"]
  env:
    - name: AIRFLOW__API__BASE_URL
      value: "https://infra-advisor-ai.kyletaylor.dev/airflow"
    - name: FORWARDED_ALLOW_IPS
      value: "*"

# ── Datadog JSON logging — loaded via Airflow's official custom settings mechanism
# $AIRFLOW_HOME/config/ is added to sys.path before configure_logging() runs,
# so airflow_local_settings is importable when LOGGING_CONFIG_CLASS is resolved.
# DDJsonFormatter emits one JSON line per record with dd.trace_id/span_id for
# Datadog log-trace correlation.  The try/except guards dag-processor where
# ddtrace is not installed.
airflowLocalSettings: |-
  import json
  import logging
  import os
  from copy import deepcopy

  try:
      import ddtrace.auto  # noqa: F401 — patches LogRecord with dd.trace_id/span_id
  except ImportError:
      pass

  try:
      from airflow.config_templates.airflow_local_settings import DEFAULT_LOGGING_CONFIG as _BASE
      _BASE_LOADED = True
  except Exception:
      _BASE_LOADED = False


  class DDJsonFormatter(logging.Formatter):
      def format(self, record: logging.LogRecord) -> str:
          record.message = record.getMessage()
          entry: dict = {
              "timestamp": self.formatTime(record),
              "level": record.levelname,
              "logger": record.name,
              "message": record.message,
              "dd.trace_id": str(getattr(record, "dd.trace_id", "0") or "0"),
              "dd.span_id": str(getattr(record, "dd.span_id", "0") or "0"),
              "dd.env": os.environ.get("DD_ENV", ""),
              "dd.service": os.environ.get("DD_SERVICE", "airflow-scheduler"),
              "dd.version": os.environ.get("DD_VERSION", ""),
          }
          if record.exc_info and not record.exc_text:
              record.exc_text = self.formatException(record.exc_info)
          if record.exc_text:
              entry["exception"] = record.exc_text
          for _ctx in ("dag_id", "task_id", "run_id", "try_number"):
              val = record.__dict__.get(_ctx)
              if val is not None:
                  entry[_ctx] = val
          return json.dumps(entry, default=str)


  class _SuppressDeprecated(logging.Filter):
      """Drop the airflow.security.permissions deprecation noise from Airflow 3.x internals."""
      def filter(self, record: logging.LogRecord) -> bool:
          return "airflow.security.permissions" not in record.getMessage()


  def _build_config() -> dict:
      if not _BASE_LOADED:
          return {}
      config = deepcopy(_BASE)
      config.setdefault("formatters", {})["dd_json"] = {
          "()": "airflow_local_settings.DDJsonFormatter",
      }
      config.setdefault("filters", {})["suppress_deprecated_permissions"] = {
          "()": "airflow_local_settings._SuppressDeprecated",
      }
      for _h in ("task", "console", "processor_to_stdout"):
          if _h in config.get("handlers", {}):
              config["handlers"][_h]["formatter"] = "dd_json"
              config["handlers"][_h].setdefault("filters", []).append(
                  "suppress_deprecated_permissions"
              )
      return config


  LOGGING_CONFIG = _build_config()

# ── Executor ───────────────────────────────────────────────────────────────────
# LocalExecutor — runs tasks inside scheduler process.
# Eliminates separate worker pods; appropriate for lab scale with 5 DAGs.
# At 3× Standard_D2s_v3 (24 GB total cluster RAM), this avoids OOM pressure.
executor: LocalExecutor

# ── Database migration ─────────────────────────────────────────────────────────
migrateDatabaseJob:
  enabled: true
  ttlSecondsAfterFinished: 300

# ── Images ────────────────────────────────────────────────────────────────────
# migrationsWaitTimeout must live here (not under migrateDatabaseJob)
images:
  migrationsWaitTimeout: 300

# ── Metadata DB ───────────────────────────────────────────────────────────────
# Built-in Postgres sidecar via Helm — uses postgres:postgres credentials.
# Do NOT override the password here; the chart manages it via its own secret.
postgresql:
  enabled: true

# ── DAG persistence ───────────────────────────────────────────────────────────
dags:
  persistence:
    enabled: true
    storageClassName: azurefile-csi
    accessMode: ReadWriteMany
    size: 1Gi
  gitSync:
    enabled: false

# ── Extra pip packages ────────────────────────────────────────────────────────
# Installed on every pod start. With LocalExecutor, tasks run in the scheduler
# so packages are needed there. Keep this list stable — pip runs on every start.
#
# DJM requirements:
#   apache-airflow-providers-openlineage >= 2.7.3  (Datadog transport)
#   openlineage-python >= 1.37.0                   (Datadog transport)
_pip_additional_requirements: >-
  apache-airflow-providers-openlineage>=2.7.3 openlineage-python>=1.37.0
  apache-airflow-providers-http>=6.0.0 azure-storage-blob>=12.28.0
  azure-search-documents>=11.6.0 azure-identity>=1.25.3 tiktoken>=0.12.0
  openpyxl>=3.1.5 pandas>=3.0.0 openai>=2.32.0 ddtrace>=4.7.1
  httpx>=0.28.1 pypdf>=5.0.0 beautifulsoup4>=4.12.3 lxml>=5.3.0

# ── Scheduler ─────────────────────────────────────────────────────────────────
scheduler:
  updateStrategy:
    type: RollingUpdate
    rollingUpdate:
      partition: 0
      maxUnavailable: 1
  livenessProbe:
    initialDelaySeconds: 120
  startupProbe:
    failureThreshold: 60
    periodSeconds: 10
  podAnnotations:
    # Lets the Datadog Agent correlate task logs with DJM run executions.
    # The Agent DaemonSet must also mount the logs PVC.
    ad.datadoghq.com/scheduler.logs: >-
      [{"type": "file", "path": "/opt/airflow/logs/*/*/*/*.log", "source":
      "airflow"}]

  env:
    # ── Datadog trace-log correlation ───────────────────────────────────────────
    # _dd_logging.py in the DAGs folder imports ddtrace.auto in every process
    # (scheduler main + LocalExecutor task subprocesses) so task logs include
    # dd.trace_id / dd.span_id that Datadog uses for log-trace correlation.
    # airflow_local_settings.py (mounted from airflowLocalSettings above) is in
    # $AIRFLOW_HOME/config/ which Airflow adds to sys.path before configure_logging().
    # PYTHONPATH includes dags/ so sitecustomize.py also auto-inits ddtrace in
    # LocalExecutor task subprocesses (which don't go through the scheduler entrypoint).
    - name: PYTHONPATH
      value: "/opt/airflow/dags"
    - name: AIRFLOW__LOGGING__LOGGING_CONFIG_CLASS
      value: "airflow_local_settings.LOGGING_CONFIG"

    # ── Datadog Data Jobs Monitoring (OpenLineage Datadog Transport) ────────────
    # Docs: https://docs.datadoghq.com/data_observability/jobs_monitoring/airflow/
    - name: OPENLINEAGE__TRANSPORT__TYPE
      value: "datadog"
    - name: OPENLINEAGE_NAMESPACE
      value: "dev"
    - name: DD_SITE
      value: "us3.datadoghq.com"
    - name: DD_API_KEY
      valueFrom:
        secretKeyRef:
          name: airflow-azure-secret
          key: DD_API_KEY

    # ── Airflow lineage backend — required for OpenLineage to emit events ───────
    - name: AIRFLOW__LINEAGE__BACKEND
      value: "openlineage.lineage_backend.OpenLineageBackend"

    # ── Spark parent job linking ────────────────────────────────────────────────
    - name: AIRFLOW__OPENLINEAGE__SPARK_INJECT_PARENT_JOB_INFO
      value: "true"

    # ── Datadog APM ─────────────────────────────────────────────────────────────
    - name: DD_ENV
      value: "dev"
    - name: DD_SERVICE
      value: "airflow-scheduler"
    - name: DD_VERSION
      value: "latest"
    - name: DD_AGENT_HOST
      value: "datadog-agent.datadog.svc.cluster.local"
    - name: DD_TRACE_AGENT_PORT
      value: "8126"
    - name: DD_LOGS_INJECTION
      value: "true"
    - name: DD_TRACE_SAMPLE_RATE
      value: "1.0"

    # ── Azure credentials ───────────────────────────────────────────────────────
    - name: AZURE_OPENAI_ENDPOINT
      valueFrom:
        secretKeyRef:
          name: airflow-azure-secret
          key: AZURE_OPENAI_ENDPOINT
    - name: AZURE_OPENAI_API_KEY
      valueFrom:
        secretKeyRef:
          name: airflow-azure-secret
          key: AZURE_OPENAI_API_KEY
    - name: AZURE_OPENAI_DEPLOYMENT
      value: "gpt-4.1-mini"
    - name: AZURE_OPENAI_EMBEDDING_DEPLOYMENT
      value: "text-embedding-3-small"
    - name: AZURE_SEARCH_ENDPOINT
      valueFrom:
        secretKeyRef:
          name: airflow-azure-secret
          key: AZURE_SEARCH_ENDPOINT
    - name: AZURE_SEARCH_API_KEY
      valueFrom:
        secretKeyRef:
          name: airflow-azure-secret
          key: AZURE_SEARCH_API_KEY
    - name: AZURE_SEARCH_INDEX_NAME
      value: "infra-advisor-knowledge"
    - name: AZURE_STORAGE_CONNECTION_STRING
      valueFrom:
        secretKeyRef:
          name: airflow-azure-secret
          key: AZURE_STORAGE_CONNECTION_STRING
    - name: EIA_API_KEY
      valueFrom:
        secretKeyRef:
          name: airflow-azure-secret
          key: EIA_API_KEY
    - name: TWDB_WATER_PLAN_WORKBOOK_URL
      value: "https://www.twdb.texas.gov/waterplanning/data/rwp-database/index.asp"
    - name: EPA_SDWIS_BASE_URL
      value: "https://enviro.epa.gov/enviro/efservice"

# ── Triggerer ─────────────────────────────────────────────────────────────────
triggerer:
  env:
    - name: PYTHONPATH
      value: "/opt/airflow/dags"
    - name: OPENLINEAGE__TRANSPORT__TYPE
      value: "datadog"
    - name: OPENLINEAGE_NAMESPACE
      value: "dev"
    - name: AIRFLOW__LINEAGE__BACKEND
      value: "openlineage.lineage_backend.OpenLineageBackend"
    - name: DD_SITE
      value: "us3.datadoghq.com"
    - name: DD_API_KEY
      valueFrom:
        secretKeyRef:
          name: airflow-azure-secret
          key: DD_API_KEY
    - name: DD_ENV
      value: "dev"
    - name: DD_SERVICE
      value: "airflow-triggerer"
    - name: DD_AGENT_HOST
      value: "datadog-agent.datadog.svc.cluster.local"

# ── DAG Processor (Airflow 3 only) ────────────────────────────────────────────
dagProcessor:
  env:
    - name: PYTHONPATH
      value: "/opt/airflow/dags"
    - name: OPENLINEAGE__TRANSPORT__TYPE
      value: "datadog"
    - name: OPENLINEAGE_NAMESPACE
      value: "dev"
    - name: AIRFLOW__LINEAGE__BACKEND
      value: "openlineage.lineage_backend.OpenLineageBackend"
    - name: DD_SITE
      value: "us3.datadoghq.com"
    - name: DD_API_KEY
      valueFrom:
        secretKeyRef:
          name: airflow-azure-secret
          key: DD_API_KEY
    - name: DD_ENV
      value: "dev"
    - name: DD_SERVICE
      value: "airflow-dag-processor"
    - name: DD_AGENT_HOST
      value: "datadog-agent.datadog.svc.cluster.local"

# ── User creation ─────────────────────────────────────────────────────────────
createUserJob:
  defaultUser:
    role: Admin
    username: admin
    email: admin@infra-advisor.local
    firstName: Admin
    lastName: User
    password: admin

# ── Resources ─────────────────────────────────────────────────────────────────
# Conservative for Standard_D2s_v3 lab cluster (3 nodes, 24 GB total RAM)
resources:
  requests:
    memory: "512Mi"
    cpu: "250m"
  limits:
    memory: "1Gi"
    cpu: "500m"

# ── Log persistence ───────────────────────────────────────────────────────────
logs:
  persistence:
    enabled: true
    storageClassName: azurefile-csi
    size: 2Gi

# ── Labels ────────────────────────────────────────────────────────────────────
labels:
  app: airflow
  tags.datadoghq.com/env: dev
  tags.datadoghq.com/service: airflow
  tags.datadoghq.com/version: "3.1"
