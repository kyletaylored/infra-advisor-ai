# TEMPLATE FILE — contains placeholder values only.
# Do NOT put real credentials here. This file is committed to the repo.
#
# To create the real secret at deploy time, run:
#   make create-agent-api-dotnet-secret
# with the following vars set in your environment (or .env):
#   AZURE_OPENAI_ENDPOINT, AZURE_OPENAI_API_KEY
#   DD_API_KEY — Datadog API key; required for LLM Observability OTLP export
#   DD_APPLICATION_KEY — Datadog application key; required (alongside
#                        DD_API_KEY) for AI Guard's HTTP API calls
#   DATABASE_URL — postgresql://user:pass@postgres.infra-advisor.svc.cluster.local:5432/infraadvisor
#                  (optional: omit to disable conversation persistence)
apiVersion: v1
kind: Secret
metadata:
  name: agent-api-dotnet-secret
  namespace: infra-advisor
type: Opaque
stringData:
  AZURE_OPENAI_ENDPOINT: "REPLACE_ME"
  AZURE_OPENAI_API_KEY: "REPLACE_ME"
  DD_API_KEY: "REPLACE_ME"
  DD_APPLICATION_KEY: "REPLACE_ME"
  DATABASE_URL: PLACEHOLDER
