---
# KafkaNodePool — defines broker+controller nodes (required in Strimzi 0.46+)
apiVersion: kafka.strimzi.io/v1
kind: KafkaNodePool
metadata:
  name: kafka-pool
  namespace: kafka
  labels:
    strimzi.io/cluster: kafka-cluster
    app.kubernetes.io/part-of: infra-advisor-ai
spec:
  replicas: 1
  roles:
    - controller
    - broker
  storage:
    type: ephemeral
  template:
    pod:
      metadata:
        annotations:
          ad.datadoghq.com/kafka.check_names: '["kafka"]'
          ad.datadoghq.com/kafka.init_configs: '[{"is_jmx": true, "collect_default_metrics": true}]'
          ad.datadoghq.com/kafka.instances: '[{"host": "%%host%%", "port": "9999"}]'
          ad.datadoghq.com/kafka.logs: '[{"source": "kafka", "service": "kafka-cluster"}]'
---
# Kafka cluster — KRaft mode, no ZooKeeper (Strimzi 0.46+)
apiVersion: kafka.strimzi.io/v1
kind: Kafka
metadata:
  name: kafka-cluster
  namespace: kafka
  labels:
    app.kubernetes.io/name: kafka-cluster
    app.kubernetes.io/part-of: infra-advisor-ai
  annotations:
    strimzi.io/node-pools: enabled
    strimzi.io/kraft: enabled
spec:
  kafka:
    version: 4.1.0
    listeners:
      - name: plain
        port: 9092
        type: internal
        tls: false
      - name: tls
        port: 9093
        type: internal
        tls: true
    config:
      offsets.topic.replication.factor: 1
      transaction.state.log.replication.factor: 1
      transaction.state.log.min.isr: 1
      default.replication.factor: 1
      min.insync.replicas: 1
      auto.create.topics.enable: "false"
      log.retention.hours: 168
  entityOperator:
    topicOperator: {}
    userOperator: {}
