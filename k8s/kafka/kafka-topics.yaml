---
apiVersion: kafka.strimzi.io/v1
kind: KafkaTopic
metadata:
  name: infra-query-events
  namespace: kafka
  labels:
    strimzi.io/cluster: kafka-cluster
    app.kubernetes.io/part-of: infra-advisor-ai
spec:
  # Topic name uses dots; the CR name above uses dashes (K8s naming constraint)
  topicName: infra.query.events
  partitions: 3
  replicas: 1
  config:
    retention.ms: 604800000   # 7 days
    cleanup.policy: delete
    min.insync.replicas: 1
---
apiVersion: kafka.strimzi.io/v1
kind: KafkaTopic
metadata:
  name: infra-eval-results
  namespace: kafka
  labels:
    strimzi.io/cluster: kafka-cluster
    app.kubernetes.io/part-of: infra-advisor-ai
spec:
  topicName: infra.eval.results
  partitions: 3
  replicas: 1
  config:
    retention.ms: 604800000   # 7 days
    cleanup.policy: delete
    min.insync.replicas: 1
