apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: ui
  namespace: infra-advisor
  labels:
    app: ui
  annotations:
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "120"
    # Self-signed cert for dev — replace with cert-manager for production
    nginx.ingress.kubernetes.io/ssl-passthrough: "false"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - infra-advisor.dev.local
      secretName: ui-tls-secret
  rules:
    - host: infra-advisor.dev.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: ui
                port:
                  number: 80
