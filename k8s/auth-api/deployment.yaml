apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-api
  namespace: infra-advisor
  labels:
    app: auth-api
    tags.datadoghq.com/env: dev
    tags.datadoghq.com/service: infraadvisor-auth-api
    tags.datadoghq.com/version: latest
spec:
  replicas: 1
  selector:
    matchLabels:
      app: auth-api
  template:
    metadata:
      labels:
        app: auth-api
        tags.datadoghq.com/env: dev
        tags.datadoghq.com/service: infraadvisor-auth-api
        tags.datadoghq.com/version: latest
      annotations:
        ad.datadoghq.com/auth-api.logs: "[{\"source\":\"python\",\"service\":\"infraadvisor-auth-api\"}]"
    spec:
      imagePullSecrets:
        - name: ghcr-pull-secret
      containers:
        - name: auth-api
          image: ghcr.io/kyletaylored/infra-advisor-ai/auth-api:latest
          ports:
            - containerPort: 8002
              name: http
          envFrom:
            - configMapRef:
                name: auth-api-config
            - secretRef:
                name: auth-api-secret
          livenessProbe:
            httpGet:
              path: /health
              port: 8002
            initialDelaySeconds: 15
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "500m"
