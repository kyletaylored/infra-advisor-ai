apiVersion: apps/v1
kind: Deployment
metadata:
  name: agent-api
  namespace: infra-advisor
  labels:
    app: agent-api
    tags.datadoghq.com/env: dev
    tags.datadoghq.com/service: infraadvisor-agent-api
    tags.datadoghq.com/version: latest
spec:
  replicas: 2
  selector:
    matchLabels:
      app: agent-api
  template:
    metadata:
      labels:
        app: agent-api
        tags.datadoghq.com/env: dev
        tags.datadoghq.com/service: infraadvisor-agent-api
        tags.datadoghq.com/version: latest
      annotations:
        ad.datadoghq.com/agent-api.logs: '[{"source":"python","service":"infraadvisor-agent-api"}]'
    spec:
      imagePullSecrets:
        - name: ghcr-pull-secret
      containers:
        - name: agent-api
          image: ghcr.io/kyletaylored/infra-advisor-ai/agent-api:latest
          ports:
            - containerPort: 8001
              name: http
          env:
            - name: DD_LLMOBS_ENABLED
              value: "true"
            - name: DD_LLMOBS_ML_APP
              value: "infra-advisor-ai"
            - name: DD_LLMOBS_AGENTLESS_ENABLED
              value: "false"
          envFrom:
            - configMapRef:
                name: agent-api-config
            - secretRef:
                name: agent-api-secret
          livenessProbe:
            httpGet:
              path: /health
              port: 8001
            initialDelaySeconds: 20
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 8001
            initialDelaySeconds: 15
            periodSeconds: 15
            timeoutSeconds: 5
          resources:
            requests:
              memory: "512Mi"
              cpu: "500m"
            limits:
              memory: "1Gi"
              cpu: "1000m"
