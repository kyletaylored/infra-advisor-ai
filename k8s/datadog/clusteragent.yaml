---
# ClusterAgent RBAC — permissions for Kubernetes state metrics
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: datadog-cluster-agent
  labels:
    app.kubernetes.io/name: datadog-cluster-agent
    app.kubernetes.io/part-of: infra-advisor-ai
rules:
  - apiGroups: [""]
    resources:
      - pods
      - nodes
      - namespaces
      - services
      - endpoints
      - events
      - componentstatuses
      - resourcequotas
      - persistentvolumes
      - persistentvolumeclaims
      - limitranges
      - replicationcontrollers
      - serviceaccounts
    verbs: ["get", "list", "watch"]
  - apiGroups: ["apps"]
    resources:
      - deployments
      - replicasets
      - daemonsets
      - statefulsets
    verbs: ["get", "list", "watch"]
  - apiGroups: ["batch"]
    resources:
      - cronjobs
      - jobs
    verbs: ["get", "list", "watch"]
  - apiGroups: ["autoscaling"]
    resources:
      - horizontalpodautoscalers
    verbs: ["get", "list", "watch"]
  - apiGroups: ["policy"]
    resources:
      - poddisruptionbudgets
    verbs: ["get", "list", "watch"]
  - apiGroups: ["storage.k8s.io"]
    resources:
      - storageclasses
      - volumeattachments
    verbs: ["get", "list", "watch"]
  - apiGroups: ["networking.k8s.io"]
    resources:
      - ingresses
      - ingressclasses
      - networkpolicies
    verbs: ["get", "list", "watch"]
  - apiGroups: ["rbac.authorization.k8s.io"]
    resources:
      - clusterroles
      - clusterrolebindings
      - roles
      - rolebindings
    verbs: ["get", "list", "watch"]
  - apiGroups: ["apiextensions.k8s.io"]
    resources:
      - customresourcedefinitions
    verbs: ["get", "list", "watch"]
  - apiGroups: ["discovery.k8s.io"]
    resources:
      - endpointslices
    verbs: ["get", "list", "watch"]
  - apiGroups: ["coordination.k8s.io"]
    resources:
      - leases
    verbs: ["get", "create", "update"]
  - apiGroups: [""]
    resources:
      - configmaps
    resourceNames:
      - datadogtoken
      - datadog-leader-election
      - datadog-custom-metrics
      - datadog-cluster-id
    verbs: ["get", "update"]
  - apiGroups: [""]
    resources:
      - configmaps
    verbs: ["create"]
  - apiGroups: ["external.metrics.k8s.io"]
    resources: ["*"]
    verbs: ["get", "list", "watch"]
  - nonResourceURLs:
      - "/version"
      - "/healthz"
      - "/metrics"
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: datadog-cluster-agent
  labels:
    app.kubernetes.io/name: datadog-cluster-agent
    app.kubernetes.io/part-of: infra-advisor-ai
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: datadog-cluster-agent
subjects:
  - kind: ServiceAccount
    name: datadog-cluster-agent
    namespace: datadog
---
# Allow node agents to query the ClusterAgent
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: datadog-agent-cluster-access
  labels:
    app.kubernetes.io/name: datadog-agent
    app.kubernetes.io/part-of: infra-advisor-ai
rules:
  - apiGroups: [""]
    resources:
      - configmaps
    resourceNames:
      - datadog-cluster-id
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: datadog-agent-cluster-access
  labels:
    app.kubernetes.io/name: datadog-agent
    app.kubernetes.io/part-of: infra-advisor-ai
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: datadog-agent-cluster-access
subjects:
  - kind: ServiceAccount
    name: datadog-agent
    namespace: datadog
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: datadog-cluster-agent
  namespace: datadog
  labels:
    app.kubernetes.io/name: datadog-cluster-agent
    app.kubernetes.io/part-of: infra-advisor-ai
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: datadog-cluster-agent
  namespace: datadog
  labels:
    app.kubernetes.io/name: datadog-cluster-agent
    app.kubernetes.io/part-of: infra-advisor-ai
spec:
  replicas: 1
  selector:
    matchLabels:
      app: datadog-cluster-agent
  template:
    metadata:
      labels:
        app: datadog-cluster-agent
        app.kubernetes.io/name: datadog-cluster-agent
    spec:
      serviceAccountName: datadog-cluster-agent
      containers:
        - name: datadog-cluster-agent
          image: gcr.io/datadoghq/cluster-agent:latest
          imagePullPolicy: Always
          ports:
            - name: cluster-agent
              containerPort: 5005
              protocol: TCP
          env:
            - name: DD_API_KEY
              valueFrom:
                secretKeyRef:
                  name: datadog-secret
                  key: api-key
            - name: DD_CLUSTER_AGENT_ENABLED
              value: "true"
            - name: DD_CLUSTER_AGENT_AUTH_TOKEN
              valueFrom:
                secretKeyRef:
                  name: datadog-secret
                  key: cluster-agent-auth-token
            - name: DD_CLUSTER_NAME
              value: aks-infra-advisor
            - name: DD_SITE
              valueFrom:
                secretKeyRef:
                  name: datadog-secret
                  key: site
            - name: DD_ENV
              value: dev
            # Enable Kubernetes state core check
            - name: DD_ORCHESTRATOR_EXPLORER_ENABLED
              value: "true"
            - name: DD_KUBERNETES_INFORMERS_RESYNC_PERIOD
              value: "300"
            # Collect Kubernetes state metrics
            - name: DD_COLLECT_KUBERNETES_EVENTS
              value: "true"
            - name: DD_LEADER_ELECTION
              value: "true"
          resources:
            requests:
              memory: 256Mi
              cpu: 200m
            limits:
              memory: 512Mi
              cpu: 500m
          livenessProbe:
            exec:
              command:
                - datadog-cluster-agent
                - health
            initialDelaySeconds: 15
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 6
          readinessProbe:
            exec:
              command:
                - datadog-cluster-agent
                - health
            initialDelaySeconds: 15
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 6
---
apiVersion: v1
kind: Service
metadata:
  name: datadog-cluster-agent
  namespace: datadog
  labels:
    app.kubernetes.io/name: datadog-cluster-agent
    app.kubernetes.io/part-of: infra-advisor-ai
spec:
  selector:
    app: datadog-cluster-agent
  ports:
    - name: cluster-agent
      port: 5005
      targetPort: 5005
      protocol: TCP
