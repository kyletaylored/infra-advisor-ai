apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres
  namespace: infra-advisor
  labels:
    app: postgres
spec:
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
      annotations:
        admission.datadoghq.com/enabled: "false"
        # DD postgres integration via autodiscovery. Full DBM feature set:
        #   - reported_hostname: stable name (vs the pod IP) so DBM /
        #     APM-DB linkage uses "infra-advisor-postgres" consistently.
        #   - DBM nested features: query samples (default), schema
        #     metadata for the DBM Schema Explorer, pg_settings config
        #     versioning, column statistics for query planner insight.
        #   - Top-level collect_* toggles: activity, functions, counts,
        #     bloat, WAL age, buffer cache, checksums. Default-on metrics
        #     (database size) stay enabled.
        #   - relations: empty regex pattern matches every table —
        #     enables per-table metrics (size, vacuum, locks, indexes).
        # Conf reference:
        #   https://github.com/DataDog/integrations-core/blob/master/postgres/datadog_checks/postgres/data/conf.yaml.example
        ad.datadoghq.com/postgres.checks: |
          {
            "postgres": {
              "init_config": {},
              "instances": [{
                "dbm": true,
                "host": "%%host%%",
                "port": 5432,
                "username": "datadog",
                "password": "%%env_DD_POSTGRES_PASSWORD%%",
                "reported_hostname": "infra-advisor-postgres",
                "disable_generic_tags": true,
                "tags": ["env:dev", "service:postgres"],
                "collect_activity_metrics": true,
                "collect_function_metrics": true,
                "collect_count_metrics": true,
                "collect_database_size_metrics": true,
                "collect_wal_metrics": true,
                "collect_bloat_metrics": true,
                "collect_checksum_metrics": true,
                "collect_buffercache_metrics": true,
                "collect_schemas": {
                  "enabled": true,
                  "max_tables": 300,
                  "collection_interval": 600
                },
                "collect_settings": {
                  "enabled": true,
                  "collection_interval": 600
                },
                "collect_column_statistics": {
                  "enabled": true,
                  "collection_interval": 1200,
                  "max_tables": 100
                },
                "relations": [{"relation_regex": ".*"}]
              }]
            }
          }
        # Tail postgres logs into DD via the standard postgresql log source.
        # postgres is configured below (args:) to emit slow-query + lock /
        # error / autovacuum lines on stderr so DD picks them up.
        ad.datadoghq.com/postgres.logs: |
          [{
            "source": "postgresql",
            "service": "infra-advisor-postgres"
          }]
    spec:
      containers:
        - name: postgres
          image: postgres:16-alpine
          args:
            - postgres
            # pg_buffercache extension powers collect_buffercache_metrics in
            # the DD postgres integration (must be in shared_preload + a
            # CREATE EXTENSION in dbm-setup.sql).
            - -c
            - shared_preload_libraries=pg_stat_statements,pg_buffercache
            - -c
            - track_activity_query_size=4096
            - -c
            - pg_stat_statements.track=all
            # track_functions=all is required for collect_function_metrics
            # to return non-empty pg_stat_user_functions rows.
            - -c
            - track_functions=all
            # Slow-query logging for DD postgres log source. Queries
            # over 1s land on stderr → DD agent log collector → DBM.
            # The %m / %p / %u / %d / %a prefix gives DD enough metadata
            # to parse user / database / app per line.
            - -c
            - log_min_duration_statement=1000
            - -c
            - log_line_prefix=%m [%p] %q[user=%u,db=%d,app=%a]
            - -c
            - log_destination=stderr
            - -c
            - logging_collector=off
            # Lock waits longer than 1s are logged — fuels DBM's lock-tree
            # views with real evidence rather than guesses.
            - -c
            - log_lock_waits=on
            - -c
            - deadlock_timeout=1000
            # Log autovacuum runs taking >1s so DD lifecycle / vacuum
            # metrics correlate with concrete actions.
            - -c
            - log_autovacuum_min_duration=1000
          ports:
            - containerPort: 5432
              name: postgres
          env:
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: POSTGRES_USER
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: POSTGRES_PASSWORD
            - name: POSTGRES_DB
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: POSTGRES_DB
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          # postgres docker-entrypoint.sh starts as root then exec's to the
          # postgres user (UID 70 in alpine), so runAsNonRoot would reject it.
          # allowPrivilegeEscalation: false is safe and prevents setuid escalation.
          securityContext:
            allowPrivilegeEscalation: false
          livenessProbe:
            exec:
              command: ["pg_isready", "-d", "authdb"]
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          volumeMounts:
            - name: postgres-data
              mountPath: /var/lib/postgresql/data
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"
      volumes:
        - name: postgres-data
          persistentVolumeClaim:
            claimName: postgres-pvc
