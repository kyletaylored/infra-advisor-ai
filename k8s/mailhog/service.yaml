---
# ClusterIP for internal SMTP (used by auth-api)
apiVersion: v1
kind: Service
metadata:
  name: mailhog
  namespace: infra-advisor
  labels:
    app: mailhog
    app.kubernetes.io/name: mailhog
    app.kubernetes.io/part-of: infra-advisor-ai
spec:
  selector:
    app: mailhog
  ports:
    - name: smtp
      port: 1025
      targetPort: smtp
      protocol: TCP
    - name: http
      port: 8025
      targetPort: http
      protocol: TCP
# mailhog-ui LoadBalancer Service intentionally removed — was exposing the
# inbox UI on a public Azure IP with no auth, leaking every password-reset
# token. For local inspection use:
#   kubectl port-forward -n infra-advisor svc/mailhog 8025:8025
# See security-audit-2026-05-16.md CRITICAL-2.
