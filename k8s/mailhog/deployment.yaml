---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mailhog
  namespace: infra-advisor
  labels:
    app: mailhog
    app.kubernetes.io/name: mailhog
    app.kubernetes.io/part-of: infra-advisor-ai
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mailhog
  template:
    metadata:
      labels:
        app: mailhog
        app.kubernetes.io/name: mailhog
      annotations:
        ad.datadoghq.com/mailhog.logs: '[{"source":"mailhog","service":"mailhog"}]'
    spec:
      containers:
        - name: mailhog
          image: mailhog/mailhog:v1.0.1
          imagePullPolicy: IfNotPresent
          ports:
            - name: smtp
              containerPort: 1025
              protocol: TCP
            - name: http
              containerPort: 8025
              protocol: TCP
          env:
            - name: MH_STORAGE
              value: memory
            - name: MH_UI_WEB_PATH
              value: ""
          resources:
            requests:
              memory: 64Mi
              cpu: 50m
            limits:
              memory: 128Mi
              cpu: 100m
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 5
            periodSeconds: 15
            timeoutSeconds: 3
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 3
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
