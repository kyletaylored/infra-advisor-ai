---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mailpit
  namespace: infra-advisor
  labels:
    app: mailpit
    app.kubernetes.io/name: mailpit
    app.kubernetes.io/part-of: infra-advisor-ai
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mailpit
  template:
    metadata:
      labels:
        app: mailpit
        app.kubernetes.io/name: mailpit
      annotations:
        ad.datadoghq.com/mailpit.logs: '[{"source":"mailpit","service":"mailpit"}]'
    spec:
      containers:
        - name: mailpit
          # Pinned to a specific release — `latest` would let an upstream
          # compromise silently roll out on next pod restart. Bump when a
          # newer Mailpit release is needed.
          image: axllent/mailpit:v1.21
          imagePullPolicy: IfNotPresent
          ports:
            - name: smtp
              containerPort: 1025
              protocol: TCP
            - name: http
              containerPort: 8025
              protocol: TCP
          envFrom:
            - configMapRef:
                name: mailpit-config
            - secretRef:
                name: mailpit-secret
          resources:
            requests:
              memory: 64Mi
              cpu: 50m
            limits:
              memory: 256Mi
              cpu: 200m
          # TCP probes only — Mailpit gates all HTTP paths behind MP_UI_AUTH
          # when set, including (in v1.21) the documented /livez and /readyz
          # endpoints. A successful TCP accept on :8025 is sufficient proof
          # the HTTP server is up; the SMTP listener has a separate TCP
          # probe so a half-failed pod (HTTP up, SMTP down) is still caught.
          livenessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 5
            periodSeconds: 15
            timeoutSeconds: 3
            failureThreshold: 3
          readinessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 3
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          startupProbe:
            tcpSocket:
              port: smtp
            failureThreshold: 6
            periodSeconds: 5
