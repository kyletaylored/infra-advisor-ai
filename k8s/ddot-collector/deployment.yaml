apiVersion: apps/v1
kind: Deployment
metadata:
  name: datadog-agent
  namespace: datadog
  labels:
    app: datadog-agent
spec:
  replicas: 1
  selector:
    matchLabels:
      app: datadog-agent
  template:
    metadata:
      labels:
        app: datadog-agent
    spec:
      containers:
        - name: datadog-agent
          image: datadog/agent:latest
          ports:
            - containerPort: 8126
              name: apm
            - containerPort: 8125
              name: dogstatsd
              protocol: UDP
            - containerPort: 4317
              name: otlp-grpc
            - containerPort: 4318
              name: otlp-http
          envFrom:
            - configMapRef:
                name: ddot-collector-config
            - secretRef:
                name: datadog-agent-secret
          livenessProbe:
            httpGet:
              path: /health
              port: 5555
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 5555
            initialDelaySeconds: 20
            periodSeconds: 15
            timeoutSeconds: 5
          resources:
            requests:
              memory: "256Mi"
              cpu: "200m"
            limits:
              memory: "512Mi"
              cpu: "500m"
